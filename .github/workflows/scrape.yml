name: Dizipal Scraper

on:
  workflow_dispatch:
  schedule:
    - cron: "*/30 * * * *"

permissions:
  contents: write

concurrency:
  group: dizipal-scraper
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Scrape series
        env:
          PYTHONUTF8: "1"
          DIZI_SELENIUM_HEADLESS: "0"
        run: xvfb-run -a python main_dizi.py

      - name: Scrape movies
        env:
          PYTHONUTF8: "1"
          FILM_SELENIUM_HEADLESS: "0"
        run: xvfb-run -a python main_film.py

      - name: Merge JSON
        env:
          PYTHONUTF8: "1"
        run: python json_birlestir.py

      - name: Commit results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .
          git diff --cached --quiet && exit 0
          git commit -m "Update scraper outputs"
          git push
